<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HeartSync Redirect</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      text-align: center;
      color: #333;
    }
    .container {
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      max-width: 400px;
    }
    .button {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 24px;
      background-color: #007bff;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      transition: background 0.3s;
      cursor: pointer;
    }
    .button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Welcome to HeartSync 💜</h1>
    <p>Trying to open your app…</p>
    <p>If nothing happens automatically, click the button below:</p>
    <div id="openAppBtn" class="button">Open HeartSync</div>
  </div>

  <script>
    const appScheme = "heartsync://join"; // Custom Scheme من AndroidManifest
    const urlWithParams = appScheme + window.location.search;

    const now = Date.now();
    // محاولة فتح التطبيق تلقائيًا
    window.location = urlWithParams;

    // إذا لم يفتح التطبيق خلال 1.5 ثانية، يظهر الزر للمستخدم
    setTimeout(() => {
      if (Date.now() - now < 1500) {
        document.getElementById("openAppBtn").style.display = "block";
      }
    }, 1500);

    // الزر يدويًا يحاول فتح التطبيق عند الضغط
    document.getElementById("openAppBtn").addEventListener("click", () => {
      window.location = urlWithParams;
    });
  </script>
</body>
</html>
